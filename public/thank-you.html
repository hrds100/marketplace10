<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFStay — Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: #1A1A1A; background: #F3F3EE; line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
a { color: #1E9A80; text-decoration: none; }
:root {
  --green: #1E9A80;
  --green-tint: #ECFDF5;
  --heading: #1A1A1A;
  --body-grey: #6B7280;
  --white: #FFFFFF;
  --border-warm: #E8E5DF;
  --green-glow: rgba(30,154,128,0.35);
}
.thank-you-card {
  background: var(--white);
  border: 1px solid var(--border-warm);
  border-radius: 24px;
  padding: 56px 40px;
  max-width: 560px;
  width: 90%;
  text-align: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #0A0A0A;
  letter-spacing: 2px;
  margin-bottom: 32px;
}
.logo .nf-box {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #0A0A0A;
  border-radius: 6px;
  padding: 2px 5px;
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
}
.check-circle {
  width: 64px;
  height: 64px;
  background: var(--green-tint);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
}
.check-circle svg { width: 32px; height: 32px; }
h1 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}
.subtitle {
  font-size: 16px;
  color: var(--body-grey);
  margin-bottom: 32px;
  line-height: 1.65;
}
.subtitle em {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--heading);
}
.access-btn {
  display: inline-block;
  background: var(--green);
  color: var(--white);
  font-size: 16px;
  font-weight: 700;
  padding: 16px 40px;
  border-radius: 14px;
  box-shadow: 0 4px 16px var(--green-glow);
  transition: transform 0.2s, box-shadow 0.2s;
  text-decoration: none;
}
.access-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px var(--green-glow);
}
.help-text {
  margin-top: 20px;
  font-size: 13px;
  color: var(--body-grey);
}
.help-text a { font-weight: 600; }

.copy-btn-wrap { position: fixed; top: 12px; right: 12px; z-index: 200; }
.copy-btn { background: #1A1A1A; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; opacity: 0.7; }
.copy-btn:hover { opacity: 1; }

@media (max-width: 640px) {
  .thank-you-card { padding: 40px 24px; }
  h1 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="copy-btn-wrap">
  <button class="copy-btn" onclick="copyPage()">Copy HTML</button>
</div>

<!-- THANK YOU PAGE -->
<div class="thank-you-card">
  <div class="logo"><span class="nf-box">nf</span>stay</div>

  <div class="check-circle">
    <svg viewBox="0 0 24 24" fill="none" stroke="#1E9A80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
  </div>

  <h1>You're in. Welcome to NFStay.</h1>

  <p class="subtitle">Your account is being set up right now. Click below to access your dashboard and start browsing <em>landlord-approved deals.</em></p>

  <!-- ⬇️ REPLACE WITH YOUR DASHBOARD LINK ⬇️ -->
  <a href="https://hub.nfstay.com/dashboard" class="access-btn">Access Your Dashboard</a>
  <!-- ⬆️ END DASHBOARD LINK ⬆️ -->

  <p class="help-text">Need help? Email <a href="mailto:support@nfstay.com">support@nfstay.com</a></p>
</div>

<script>
function copyPage() {
  const html = document.documentElement.outerHTML;
  const cleaned = html.replace(/<div class="copy-btn-wrap">[\s\S]*?<\/div>/, '');
  navigator.clipboard.writeText(cleaned).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy HTML', 2000);
  });
}
</script>

</body>
</html>
